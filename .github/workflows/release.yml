name: Publish release

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write # required for GitHub Packages publishing
  id-token: write # required for trusted publishing

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify versions match tag
    runs-on: ubuntu-latest
    if: ${{ !github.event.release.prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Extract versions
        id: versions
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Allow tags like v1.2.3 or 1.2.3
          TAG_NO_V=${TAG#v}
          echo "tag=${TAG_NO_V}" >> "$GITHUB_OUTPUT"

          # package.json version via Node (works regardless of type: module)
          PKG_VER=$(node -e "console.log(JSON.parse(require('fs').readFileSync('package.json','utf8')).version)")
          echo "npm=${PKG_VER}" >> "$GITHUB_OUTPUT"

          echo "Tag:        $TAG_NO_V"
          echo "npm:        $PKG_VER"

          if [[ "$PKG_VER" != "$TAG_NO_V" ]]; then
            echo "Version mismatch: tag=$TAG_NO_V, npm=$PKG_VER" >&2
            exit 1
          fi
  verify_prerelease:
    name: Verify prerelease versions match tag
    runs-on: ubuntu-latest
    if: github.event.release.prerelease
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Extract and verify versions
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          TAG_NO_V=${TAG#v}

          # Ensure the tag contains a prerelease identifier (e.g. 0.0.13-beta.1)
          if [[ ! "$TAG_NO_V" =~ ^[0-9]+\.[0-9]+\.[0-9]+-.+ ]]; then
            echo "Tag '$TAG_NO_V' does not look like a valid prerelease version" >&2
            exit 1
          fi

          BASE_VERSION=${TAG_NO_V%%-*}

          PKG_VER=$(node -e "console.log(JSON.parse(require('fs').readFileSync('package.json','utf8')).version)")

          echo "Tag:          $TAG_NO_V"
          echo "Base version: $BASE_VERSION"
          echo "npm:          $PKG_VER"

          if [[ "$PKG_VER" != "$BASE_VERSION" ]]; then
            echo "Version mismatch: tag base=$BASE_VERSION, npm=$PKG_VER" >&2
            exit 1
          fi
  publish_npm:
    name: Publish npm package
    needs: verify
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - name: Ensure modern npm for OIDC trusted publishing
        run: npm install -g npm@latest
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Install dependencies
        run: pnpm install
      - name: Publish package
        run: npm publish --access public
  publish_npm_canary:
    name: Publish npm canary
    needs: verify_prerelease
    if: github.event.release.prerelease
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Ensure modern npm for OIDC trusted publishing
        run: npm install -g npm@latest
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Install dependencies
        run: pnpm install
      - name: Set canary version from tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting canary version: $TAG_VERSION"
          npm version "$TAG_VERSION" --no-git-tag-version
      - name: Publish canary
        run: npm publish --tag canary --access public
